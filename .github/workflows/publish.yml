name: Publish to npm

# Publishes the package when a GitHub Release is published. The release tag
# should match the version in package.json (e.g. tag "v0.1.3").
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  test:
    name: test before publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      - name: Byte-compile Python
        run: python3 -m compileall -q lib/
      - name: Run validation suite
        run: tests/validate.sh

  publish:
    name: publish
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag matches package.json version
        if: github.event_name == 'release'
        run: |
          pkg_version="$(node -p "require('./package.json').version")"
          tag="${GITHUB_REF_NAME#v}"
          echo "package.json: $pkg_version   tag: $tag"
          if [ "$pkg_version" != "$tag" ]; then
            echo "::error::tag ($tag) does not match package.json version ($pkg_version)" >&2
            exit 1
          fi

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
